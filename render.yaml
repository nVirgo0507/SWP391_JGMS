# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: swp391-jgms-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /swagger/index.html
    region: singapore
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: AiAgentSettings__BaseUrl
        sync: false  # Update this manually in the Render dashboard with your current ngrok URL
      - key: AiAgentSettings__Username
        sync: false  # Update this manually in the Render dashboard with your basic auth username (e.g. user01)
      - key: AiAgentSettings__Password
        sync: false  # Update this manually in the Render dashboard with your basic auth password
      - key: ConnectionStrings__DefaultConnection
        sync: false  # set manually in Render dashboard
      - key: Jwt__Key
        generateValue: true  # auto-generates a random secret
      - key: Jwt__Issuer
        value: SWP391_JGMS
      - key: Jwt__Audience
        value: SWP391_JGMS_USERS
      - key: Jwt__ExpireMinutes
        value: 120
      - key: AtlassianOAuth__ClientId
        value: Be2cDozpCdWL3L7cpSTdDeElDuBtoIkW
      - key: AtlassianOAuth__ClientSecret
        sync: false  # set manually in Render dashboard
      - key: AtlassianOAuth__RedirectUri
        value: https://YOUR_DEPLOYED_FRONTEND_URL/student/jira-callback
      - key: AtlassianOAuth__Scope
        value: read:jira-work write:jira-work read:jira-user read:me offline_access

databases:
  - name: jgms-db
    plan: free
    region: singapore
    databaseName: jgms
    user: admin

